<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVote | Voting System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Home Page -->
    <section id="home-page" class="page active-page">
        <div class="home-container">
            <div class="home-header">
                <h1>SecureVote</h1>
                <p>Secure and Anonymous Voting System</p>
            </div>

            <div class="login-portals">
                <!-- Admin Login -->
                <div class="login-card admin-card">
                    <h2>Admin Login</h2>
                    <p>Access the admin dashboard</p>
                    <form onsubmit="handleAdminLogin(event)">
                        <div class="form-group">
                            <label for="admin-username">Username:</label>
                            <input type="text" id="admin-username" placeholder="Enter username" required>
                        </div>
                        <div class="form-group">
                            <label for="admin-password">Password:</label>
                            <input type="password" id="admin-password" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn-primary">Login</button>
                    </form>
                    <p id="admin-error" class="error-msg"></p>
                </div>

                <!-- Voter Portal -->
                <div class="login-card voter-card">
                    <h2>Voter Portal</h2>
                    <p>Enter your name to vote</p>
                    <form onsubmit="handleVoterLogin(event)">
                        <div class="form-group">
                            <label for="voter-name">Your Name:</label>
                            <input type="text" id="voter-name" placeholder="Enter your name" required>
                        </div>
                        <button type="submit" class="btn-primary">Enter Voting Booth</button>
                    </form>
                    <p id="voter-error" class="error-msg"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Navigation Bar (Shown after login) -->
    <nav class="navbar" id="navbar" style="display: none;">
        <div class="logo">SecureVote</div>
        <div class="nav-links">
            <button onclick="switchPage('voting')" id="btn-voting" class="active">Voting Booth</button>
            <button onclick="switchPage('admin')" id="btn-admin">Admin Dashboard</button>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <main id="main-content" style="display: none;">
        <!-- Voter Voting Page -->
        <section id="voting-page" class="page active-page">
            <div class="header-text">
                <h2>Cast Your Vote</h2>
                <p>Welcome, <strong id="voter-name-display"></strong>! Select a candidate below. Your vote is secure and anonymous.</p>
            </div>
            
            <div class="candidates-grid" id="candidates-container"></div>
        </section>

        <!-- Admin Dashboard Page -->
        <section id="admin-page" class="page">
            <div class="header-text">
                <h2>Live Results</h2>
                <p>Real-time vote tracking and system analytics.</p>
            </div>

            <div class="results-container" id="results-container"></div>
            
            <div class="admin-controls">
                <button onclick="resetSystem()" class="danger-btn">Reset All Votes</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
